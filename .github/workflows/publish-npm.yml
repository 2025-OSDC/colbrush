name: Publish npm

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/master' &&
      (
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.event.head_commit.message, 'chore: bump version') == false
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: |
          git config --local user.email "tell280210@gmail.com"
          git config --local user.name "Colbrush Bot"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" "$LAST_TAG"..HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi
          VERSION_TYPE="patch"

          if echo "$COMMITS" | grep -qiE "(BREAKING|💥)"; then
            VERSION_TYPE="major"
          elif echo "$COMMITS" | grep -qiE "feat"; then
            VERSION_TYPE="minor"
          fi

          npm version "$VERSION_TYPE" -m "chore: bump version to v%s"

      - name: Publish to npm
        run: npm publish --provenance

      - name: Push version commit and tag
        run: git push origin HEAD:master --follow-tags
